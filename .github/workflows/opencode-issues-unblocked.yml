name: opencode-issues-unblocked

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: read
  issues: write

jobs:
  discover-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      issue_numbers: ${{ steps.discover.outputs.issue_numbers }}

    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}

    steps:
      - name: Find open ready-for-agent issues without open blockers
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          echo "Scanning open issues labelled ready-for-agent..."

          issues_json=$(gh issue list \
            --repo "$REPO" \
            --state open \
            --label "ready-for-agent" \
            --limit 100 \
            --json number)

          issue_numbers=$(echo "$issues_json" | jq -r '.[].number')

          ready_issues=()

          for issue_number in $issue_numbers; do
            echo "Checking dependencies for issue #$issue_number"

            blockers_json=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/$REPO/issues/$issue_number/dependencies/blocked_by")

            open_blockers=$(echo "$blockers_json" | jq '[.[] | select(.state == "open")] | length')

            echo "Issue #$issue_number has $open_blockers open blocker(s)"

            if [ "$open_blockers" -eq 0 ]; then
              ready_issues+=("$issue_number")
            fi
          done

          if [ "${#ready_issues[@]}" -eq 0 ]; then
            issue_numbers_json="[]"
          else
            issue_numbers_json=$(printf '%s\n' "${ready_issues[@]}" | jq -R . | jq -c -s .)
          fi

          echo "Ready issues: $issue_numbers_json"
          echo "issue_numbers=$issue_numbers_json" >> "$GITHUB_OUTPUT"

  opencode:
    needs: discover-issues
    if: needs.discover-issues.outputs.issue_numbers != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        issue_number: ${{ fromJson(needs.discover-issues.outputs.issue_numbers) }}

    concurrency:
      group: opencode-issue-${{ matrix.issue_number }}
      cancel-in-progress: false

    env:
      AGENT_NAME: orchestrator
      MODEL_NAME: opencode-go/glm-5.2
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mark issue as picked up
        run: |
          gh issue edit "${{ matrix.issue_number }}" \
            --remove-label "ready-for-agent" \
            --add-label "agent-running"

      - name: Log start working in comment
        run: |
          gh issue comment "${{ matrix.issue_number }}" --body "Start working on #${{ matrix.issue_number }}
          - Agent: ${{ env.AGENT_NAME }}
          - Model: ${{ env.MODEL_NAME }}"

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          ORCHESTRATOR_AUTO_APPROVAL: 1
        with:
          model: ${{ env.MODEL_NAME }}
          agent: ${{ env.AGENT_NAME }}
          prompt: |
            You are a senior software engineer.
            Orchestrate issue #${{ matrix.issue_number }} to completion according to your definition.

      - name: Remove running label
        if: always()
        run: |
          gh issue edit "${{ matrix.issue_number }}" \
            --remove-label "agent-running" || true
