name: opencode-pr-review

on:
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/minimax-m3
          prompt: |
            Look at the comments left by the reviewer on this pull request. If the comments are asking for changes:
              - Determin if the changes are valid and are in scope of the pull request. If they are not valid or out of scope, respond with a comment explaining why.
              - If the changes are valid and in scope, implement the changes in the code. Do not make any other changes to the code that go beyond the scope of the review comments.