name: opencode-issue-large

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /orch') ||
      startsWith(github.event.comment.body, '/orch') ||
      contains(github.event.comment.body, ' /orchestrator') ||
      startsWith(github.event.comment.body, '/orchestrator')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    env:
      AGENT_NAME: orchestrator
      MODEL_NAME: opencode-go/glm-5.2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Log start working in comment
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "Start working on #${{ github.event.issue.number }}
          - Agent: ${{ env.AGENT_NAME }}
          - Model: ${{ env.MODEL_NAME }}"

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: ${{ env.MODEL_NAME }}
          agent: ${{ env.AGENT_NAME }}
          prompt: |
            You are a senior software engineer.
            Create a comment on the issue that states that you are starting to work on the issue. Use the following command to create the comment and replace <ISSUE NUMBER> with the actual issue number, <AGENT> with the agent name, and <MODEL> with the model name:
            ```gh issue comment "<ISSUE NUMBER>" --body "Start working on #<ISSUE NUMBER>"
            - Agent: <AGENT>
            - Model: <MODEL>"```
            Orchestrate this issue to completion according to your definition. If this is a subissue, also read the parent issue for context.