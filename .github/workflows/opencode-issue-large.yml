name: opencode-issue-large

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc-o') ||
      startsWith(github.event.comment.body, '/oc-o') ||
      contains(github.event.comment.body, ' /opencode-orchestrator') ||
      startsWith(github.event.comment.body, '/opencode-orchestrator')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode-go/glm-5.2
          agent: orchestrator
          prompt: |
            You are a senior software engineer.
            Implement the feature described in the issue. If this is a subissue, also read the parent issue for context.