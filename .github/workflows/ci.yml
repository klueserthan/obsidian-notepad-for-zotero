name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests + build
    runs-on: ubuntu-latest
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build
        run: npm run build
      - name: Upload xpi
        uses: actions/upload-artifact@v4
        with:
          name: xpi
          path: .scaffold/build/*.xpi

  integration:
    name: Integration tests (headless Zotero)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Setup JS
        uses: zotero-plugin-dev/workflows/setup-js@main
      - name: Mocha-in-Zotero tests
        run: npm run test:zotero
